<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konversi Mata Uang</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="card-container">
        <h1>Konversi Mata Uang</h1>
        <p class="kurs-text">Kurs Real-Time: 1 USD = <b>Rp 17000.47</b></p>

        <form method="POST">
            <div class="input-group">
                <input type="number" step="any" name="usd" class="input-field" placeholder="Jumlah Dollar (USD)" required>
            </div>
            
            <button type="submit" class="btn-hitung">Hitung Sekarang</button>
        </form>

        {% if hasil %}
        <div class="result-section">
            <span class="result-label">HASIL KONVERSI:</span>
            <div class="result-value">Rp {{ hasil }}</div>
        </div>
        {% endif %}
    </div>

</body>
</html>
